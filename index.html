<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>DarkNet Social</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#121212;
    color:#e4e4e4;
}

/* barra superior */

header{
    background:#1e1e1e;
    padding:15px;
    font-size:20px;
    font-weight:bold;
    border-bottom:1px solid #333;
}

/* layout */

.container{
    width:600px;
    margin:auto;
    margin-top:20px;
}

/* criar post */

.create-post{
    background:#1e1e1e;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

textarea{
    width:100%;
    background:#2a2a2a;
    color:white;
    border:none;
    padding:10px;
    border-radius:6px;
}

button{
    margin-top:10px;
    padding:8px 15px;
    background:#4a6cff;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

/* posts */

.post{
    background:#1e1e1e;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.username{
    font-weight:bold;
}

.like{
    margin-top:10px;
    cursor:pointer;
    color:#888;
}

</style>
</head>

<body>

<header>
🌙 DarkNet Social
</header>

<div class="container">

<div class="create-post">
<textarea placeholder="O que você está pensando?"></textarea>
<button>Postar</button>
</div>

<div class="post">
<div class="username">usuario_1</div>
<p>Olá mundo! Esse é meu primeiro post.</p>
<div class="like">❤️ Curtir</div>
</div>

<div class="post">
<div class="username">dev_player</div>
<p>Acabei de criar minha rede social em HTML!</p>
<div class="like">❤️ Curtir</div>
</div>

</div>

</body>
</html>
